name: carnine_frontend
description: Minimal Flutter bootstrap frontend for Carnine.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  grpc: ^5.1.0
  protobuf: ^6.0.0
  logging: ^1.2.0
  window_manager: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  protoc_plugin: ^25.0.0

flutter:
  uses-material-design: true
